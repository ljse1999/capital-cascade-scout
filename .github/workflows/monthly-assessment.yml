name: Capital Cascade Monthly Sector Assessment

on:
  schedule:
    - cron: "0 7 1 * *"   # 07:00 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  assess:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the sector assessment
        run: python -m scout.sector_assessment

      - name: Commit assessment
        run: |
          git config user.name  "cascade-scout"
          git config user.email "actions@github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new assessment to commit."
          else
            git commit -m "Monthly sector assessment: $(date -u +%Y-%m-%d)"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
